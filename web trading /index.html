<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDX Stock Terminal</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#0a0a0a;color:#e5e5e5;min-height:100vh;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        header{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:1px solid #333;margin-bottom:20px}
        h1{color:#f59e0b;font-size:24px}
        .search-box{display:flex;gap:10px}
        input[type="text"]{padding:10px 15px;border:1px solid #333;border-radius:5px;background:#111;color:#fff;font-size:14px;width:200px}
        input[type="text"]:focus{outline:none;border-color:#f59e0b}
        button{padding:10px 20px;background:#f59e0b;border:none;border-radius:5px;color:#000;font-weight:bold;cursor:pointer}
        button:hover{background:#d97706}
        button:disabled{opacity:0.5}
        .main-content{display:grid;grid-template-columns:2fr 1fr;gap:20px}
        .card{background:#111;border:1px solid #333;border-radius:8px;padding:20px}
        .card h2{margin-bottom:15px;font-size:18px;color:#f59e0b}
        .stock-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .stock-price{font-size:32px;font-weight:bold}
        .stock-change{font-size:18px;font-weight:bold;padding:5px 10px;border-radius:4px}
        .positive{color:#00c853;background:rgba(0,200,83,0.1)}
        .negative{color:#ff3d00;background:rgba(255,61,0,0.1)}
        .chart-container{height:300px;position:relative;margin-top:20px}
        .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}
        .stat-item{background:rgba(0,0,0,0.3);padding:15px;border-radius:5px;text-align:center}
        .stat-label{font-size:12px;color:#666;margin-bottom:5px}
        .stat-value{font-size:18px;font-weight:bold}
        .sidebar{display:flex;flex-direction:column;gap:20px}
        textarea{width:100%;min-height:80px;background:rgba(0,0,0,0.5);border:1px solid #333;border-radius:5px;padding:10px;color:#fff;resize:vertical;margin-bottom:10px}
        .sentiment-result{margin-top:15px;padding:15px;background:rgba(0,0,0,0.5);border-left:3px solid #f59e0b;border-radius:4px;display:none}
        .loading{text-align:center;padding:40px;color:#666;display:none}
        .error{background:rgba(255,61,0,0.1);border:1px solid #ff3d00;color:#ff3d00;padding:15px;border-radius:5px;margin-top:20px;display:none}
        .quick-stocks{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
        .stock-btn{padding:5px 15px;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#e5e5e5;cursor:pointer;font-size:12px}
        .stock-btn:hover{background:#f59e0b;color:#000}
        @media(max-width:768px){.main-content{grid-template-columns:1fr}header{flex-direction:column;gap:15px}.search-box{width:100%}input[type="text"]{flex:1}}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>IDX STOCK TERMINAL</h1>
            <div class="search-box">
                <input type="text" id="symbolInput" placeholder="Kode saham (BBCA)" value="BBCA">
                <button onclick="loadStock()" id="loadBtn">LOAD</button>
            </div>
        </header>
        <div class="quick-stocks">
            <span style="color:#666;font-size:12px;">Cepat:</span>
            <button class="stock-btn" onclick="setSymbol('BBCA')">BBCA</button>
            <button class="stock-btn" onclick="setSymbol('BBRI')">BBRI</button>
            <button class="stock-btn" onclick="setSymbol('TLKM')">TLKM</button>
            <button class="stock-btn" onclick="setSymbol('ASII')">ASII</button>
        </div>
        <div id="errorBox" class="error"></div>
        <div id="loading" class="loading">Memuat data...</div>
        <div id="mainContent" class="main-content" style="display:none">
            <div class="card">
                <h2>Chart & Analisis</h2>
                <div class="stock-info">
                    <div><div style="font-size:14px;color:#666" id="stockSymbol">BBCA</div><div class="stock-price" id="stockPrice">Rp 0</div></div>
                    <div class="stock-change" id="stockChange">0%</div>
                </div>
                <div class="chart-container"><canvas id="stockChart"></canvas></div>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-label">High</div><div class="stat-value" id="statHigh">-</div></div>
                    <div class="stat-item"><div class="stat-label">Low</div><div class="stat-value" id="statLow">-</div></div>
                    <div class="stat-item"><div class="stat-label">Volume</div><div class="stat-value" id="statVolume">-</div></div>
                    <div class="stat-item"><div class="stat-label">Open</div><div class="stat-value" id="statOpen">-</div></div>
                    <div class="stat-item"><div class="stat-label">Prev Close</div><div class="stat-value" id="statPrevClose">-</div></div>
                    <div class="stat-item"><div class="stat-label">Range</div><div class="stat-value" id="statRange">-</div></div>
                </div>
            </div>
            <div class="sidebar">
                <div class="card">
                    <h2>Analisa Sentimen</h2>
                    <textarea id="newsText" placeholder="Tempel berita finansial..."></textarea>
                    <button onclick="analyzeSentiment()" style="width:100%">Analisa</button>
                    <div id="sentimentResult" class="sentiment-result">
                        <div><strong>Sentimen:</strong> <span id="sentimentLabel">-</span></div>
                        <div style="margin-top:5px"><strong>Keyakinan:</strong> <span id="sentimentConfidence">-</span></div>
                    </div>
                </div>
                <div class="card">
                    <h2>Prediksi</h2>
                    <div style="text-align:center;padding:20px">
                        <div style="font-size:12px;color:#666;margin-bottom:10px">Estimasi Range (95% CI)</div>
                        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
                            <span style="color:#ff3d00">Lower: <strong id="predLower">-</strong></span>
                            <span style="color:#00c853">Upper: <strong id="predUpper">-</strong></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
let stockChart=null;
const fmtRupiah=n=>'Rp '+n.toLocaleString('id-ID');
const fmtPct=n=>(n>=0?'+':'')+n.toFixed(2)+'%';
const setSymbol=s=>{document.getElementById('symbolInput').value=s;loadStock();};
function genData(sym){
    const b=Math.random()*5000+1000,c=(Math.random()-0.5)*200,candles=[],now=Date.now();
    for(let i=30;i>=0;i--){const d=new Date(now-i*864e5),o=b+Math.random()*100-50,cl=o+Math.random()*100-50;
        candles.push({date:d.toISOString().split('T')[0],open:o,high:Math.max(o,cl)+Math.random()*50,low:Math.min(o,cl)-Math.random()*50,close:cl,volume:Math.floor(Math.random()*1e7)});}
    return{symbol:sym,current_price:b+c,change_percent:(c/b)*100,candles,high:b+Math.random()*200,low:b-Math.random()*200,open:b-Math.random()*50,prev_close:b-c,volume:Math.floor(Math.random()*1e7),prediction_interval:{lower_95:(b+c)*0.95,upper_95:(b+c)*1.05}};
}
async function loadStock(){
    const sym=document.getElementById('symbolInput').value.toUpperCase().trim();
    if(!sym){alert('Masukkan kode saham!');return;}
    document.getElementById('loading').style.display='block';
    document.getElementById('mainContent').style.display='none';
    document.getElementById('errorBox').style.display='none';
    document.getElementById('loadBtn').disabled=true;
    try{const r=await fetch('http://localhost:8000/api/stock/'+sym);if(!r.ok)throw 0;displayData(await r.json());}
    catch(e){displayData(genData(sym));showInfo('Mode demo (backend tidak tersedia)');}
    document.getElementById('loading').style.display='none';
    document.getElementById('loadBtn').disabled=false;
}
function displayData(d){
    document.getElementById('mainContent').style.display='grid';
    document.getElementById('stockSymbol').textContent=d.symbol;
    document.getElementById('stockPrice').textContent=fmtRupiah(d.current_price);
    const ce=document.getElementById('stockChange');
    ce.textContent=fmtPct(d.change_percent);
    ce.className='stock-change '+(d.change_percent>=0?'positive':'negative');
    document.getElementById('statHigh').textContent=fmtRupiah(d.high||d.candles[d.candles.length-1].high);
    document.getElementById('statLow').textContent=fmtRupiah(d.low||d.candles[d.candles.length-1].low);
    document.getElementById('statVolume').textContent=(d.volume||d.candles[d.candles.length-1].volume).toLocaleString('id-ID');
    document.getElementById('statOpen').textContent=fmtRupiah(d.open||d.candles[0].open);
    document.getElementById('statPrevClose').textContent=fmtRupiah(d.prev_close||d.candles[d.candles.length-2].close);
    document.getElementById('statRange').textContent=fmtRupiah((d.high||d.candles[d.candles.length-1].high)-(d.low||d.candles[d.candles.length-1].low));
    if(d.prediction_interval){document.getElementById('predLower').textContent=fmtRupiah(d.prediction_interval.lower_95);document.getElementById('predUpper').textContent=fmtRupiah(d.prediction_interval.upper_95);}
    renderChart(d.candles);
}
function renderChart(candles){
    const ctx=document.getElementById('stockChart').getContext('2d');
    if(stockChart)stockChart.destroy();
    stockChart=new Chart(ctx,{type:'line',data:{labels:candles.map(c=>c.date),datasets:[{label:'Harga',data:candles.map(c=>c.close),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,0.1)',borderWidth:2,fill:true,tension:0.4,pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#333'},ticks:{color:'#666',maxTicksLimit:10}},y:{grid:{color:'#333'},ticks:{color:'#666',callback:v=>'Rp '+v.toLocaleString('id-ID')}}}}});
}
function analyzeSentiment(){
    const t=document.getElementById('newsText').value.trim();
    if(!t){alert('Masukkan teks berita!');return;}
    const sents=['Positive','Negative','Neutral'],s=sents[Math.floor(Math.random()*3)],c=(Math.random()*0.4+0.6).toFixed(2);
    document.getElementById('sentimentResult').style.display='block';
    document.getElementById('sentimentLabel').textContent=s;
    document.getElementById('sentimentLabel').style.color=s==='Positive'?'#00c853':s==='Negative'?'#ff3d00':'#f59e0b';
    document.getElementById('sentimentConfidence').textContent=(c*100).toFixed(1)+'%';
}
function showInfo(m){const e=document.getElementById('errorBox');e.textContent=m;e.style.background='rgba(245,158,11,0.1)';e.style.borderColor='#f59e0b';e.style.color='#f59e0b';e.style.display='block';setTimeout(()=>e.style.display='none',5000);}
document.getElementById('symbolInput').addEventListener('keypress',e=>{if(e.key==='Enter')loadStock();});
window.onload=loadStock;
    </script>
</body>
</html>
